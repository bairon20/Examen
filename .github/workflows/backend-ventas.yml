name: Build & Deploy Ventas API

on:
  push:
    branches:
      - main
    paths:
      - 'back-Ventas_SpringBoot/**'
  repository_dispatch:
    types:
      - backend-ventas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
            
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Create .env from GitHub secrets
        run: |
          echo "DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
     
      - name: List files in the working directory
        run: ls -alh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ventas_api:latest
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile

      - name: Get ECR Password
        id: ecr-pass
        run: |
          echo "PASSWORD=$(aws ecr get-login-password --region us-east-1)" >> $GITHUB_ENV

      - name: Instalar Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Configurar Doppler CLI
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler setup --token $DOPPLER_TOKEN

      - name: Obtener secretos desde Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "EC2_KEY=$(doppler secrets get EC2_KEY --plain)" >> $GITHUB_ENV
          echo "SERVIDOR_VENTAS=$(doppler secrets get SERVIDOR_VENTAS --plain)" >> $GITHUB_ENV

      - name: Login SSH on EC2 to Deploy
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_PASSWORD: ${{ env.PASSWORD }}
        with:
          host: ${{ env.SERVIDOR_VENTAS }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_KEY_CITT }}
          port: ${{ secrets.EC2_SSH_PORT }}
          envs: ECR_REGISTRY,ECR_PASSWORD
          script: |
            mkdir -p /home/ubuntu/ventas/
            cd /home/ubuntu/ventas/
            sudo apt update -y
            sudo apt install -y docker.io docker-compose
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            sudo docker pull $ECR_REGISTRY/ventas_api:latest
            sudo docker stop ventas_api || true
            sudo docker rm ventas_api || true
            sudo docker run -d --name ventas_api -p 8080:8080 \
              -e "DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}" \
              -e "DB_PORT=${{ secrets.DB_PORT }}" \
              -e "DB_NAME=${{ secrets.DB_NAME }}" \
              -e "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              $ECR_REGISTRY/ventas_api:latest
