name: Build & Deploy Ventas API

on:
  push:
    branches:
      - main
    paths:
      - 'back-Ventas_SpringBoot/**'
  repository_dispatch:
    types:
      - backend-ventas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
            
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Create .env from GitHub secrets
        run: |
          echo "DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
     
      - name: List files in the working directory
        run: ls -alh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ventas_api:latest
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile

      - name: Deploy to Amazon ECS Fargate
        run: |
          aws ecs update-service --cluster proyecto-semestral-cluster --service ventas-service --force-new-deployment --region us-east-1
