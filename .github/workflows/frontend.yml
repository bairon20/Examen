name: Build & Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'front_despacho/**'
  repository_dispatch:
    types:
      - frontend
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
            
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Instalar Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Configurar Doppler CLI
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler setup --token $DOPPLER_TOKEN

      - name: Obtener secretos desde Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "SERVIDOR_FRONTEND=$(doppler secrets get SERVIDOR_FRONTEND --plain)" >> $GITHUB_ENV
          echo "SERVIDOR_VENTAS=$(doppler secrets get SERVIDOR_VENTAS --plain)" >> $GITHUB_ENV
          echo "SERVIDOR_DESPACHO=$(doppler secrets get SERVIDOR_DESPACHO --plain)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/front_despacho:latest
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          build-args: |
            VITE_API_VENTAS_URL=http://${{ env.SERVIDOR_VENTAS }}:8080/api/v1/ventas
            VITE_API_DESPACHOS_URL=http://${{ env.SERVIDOR_DESPACHO }}:8081/api/v1/despachos

      - name: Get ECR Password
        id: ecr-pass
        run: |
          echo "PASSWORD=$(aws ecr get-login-password --region us-east-1)" >> $GITHUB_ENV

      - name: Desplegar en EC2 mediante SSH
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_PASSWORD: ${{ env.PASSWORD }}
        with:
          host: ${{ env.SERVIDOR_FRONTEND }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.PORT }}
          envs: ECR_REGISTRY,ECR_PASSWORD
          script: |
            mkdir -p /home/ubuntu/front_despacho/
            cd /home/ubuntu/front_despacho/
            sudo apt update -y
            sudo apt install -y docker.io docker-compose
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            sudo docker pull $ECR_REGISTRY/front_despacho:latest
            sudo docker stop front_despacho || true
            sudo docker rm front_despacho || true
            sudo docker run -d --name front_despacho -p 80:80 $ECR_REGISTRY/front_despacho:latest
