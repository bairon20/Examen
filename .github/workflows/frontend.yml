name: Build & Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'front_despacho/**'
  repository_dispatch:
    types:
      - frontend
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
            
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/front_despacho:latest
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          build-args: |
            VITE_API_VENTAS_URL=http://semestral-alb-25385715.us-east-1.elb.amazonaws.com/api/v1/ventas
            VITE_API_DESPACHOS_URL=http://semestral-alb-25385715.us-east-1.elb.amazonaws.com/api/v1/despachos

      - name: Deploy to Amazon ECS Fargate
        run: |
          aws ecs update-service --cluster proyecto-semestral-cluster --service front-despacho-service-v2 --force-new-deployment --region us-east-1
